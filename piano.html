<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ 兒童專注力鋼琴大冒險 🎹</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', '微軟正黑體', sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #e0f7fa 0%, #fff9c4 100%);
            margin: 0;
            padding: 20px;
            user-select: none;
            overflow-x: hidden;
        }
        h1 { color: #333; font-size: 32px; text-shadow: 2px 2px 0px #fff; }
        
        /* 儀表板 */
        .dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .info-box {
            background: white;
            padding: 10px 20px;
            border-radius: 15px;
            box-shadow: 0 6px 0 #ccc;
            font-size: 22px;
            font-weight: bold;
            min-width: 120px;
        }
        #score-box { color: #ff5722; border: 3px solid #ff5722; }
        #combo-box { color: #e91e63; border: 3px solid #e91e63; transform: scale(1); transition: transform 0.1s; }
        #status-box { color: #4caf50; border: 3px solid #4caf50; }
        #status-box.distracted { color: #757575; border: 3px solid #757575; background: #eee; }

        .score-display {
            font-size: 36px;
            font-weight: bold;
            color: #2196f3;
            background: white;
            display: inline-block;
            padding: 15px 30px;
            border-radius: 20px;
            box-shadow: 0 8px 0 #bbb;
            margin-bottom: 25px;
            letter-spacing: 5px;
        }
        
        /* 琴鍵 */
        .piano-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            padding-bottom: 20px;
        }
        .key {
            width: 65px;
            height: 220px;
            background: white;
            border: 3px solid #333;
            border-radius: 0 0 10px 10px;
            margin: 0 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 20px;
            box-sizing: border-box;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 8px 0 #9e9e9e;
            transition: all 0.05s;
        }
        /* 絢麗高亮 */
        .key.highlight {
            background: linear-gradient(to bottom, #fff700 0%, #ff9800 100%);
            box-shadow: 0 8px 0 #f57c00;
            border-color: #e65100;
            animation: bounce 0.6s infinite alternate;
        }
        .key:active, .key.active {
            height: 214px;
            box-shadow: 0 2px 0 #9e9e9e;
            margin-top: 6px;
            background-color: #e0e0e0;
        }

        /* 歌曲按鈕 */
        .btn {
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            margin: 5px;
            cursor: pointer;
            background-color: #00bcd4;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 0 #0097a7;
        }
        .btn:active { transform: translateY(4px); box-shadow: none; }

        /* 絢麗大圖示慶祝層 */
        .celebration-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .celebration-overlay.show { opacity: 1; pointer-events: auto; }
        .celebration-badge {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 30px #ffeb3b;
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .celebration-overlay.show .celebration-badge { transform: scale(1); }
        .celebration-badge h2 { font-size: 60px; margin: 0; color: #ff9800; animation: rainbowText 2s infinite; }
        .celebration-badge p { font-size: 24px; color: #555; font-weight: bold; }
        .big-icon { font-size: 100px; animation: spin 1s ease-out; }

        /* 動畫特效 */
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }
        @keyframes spin {
            0% { transform: rotate(0deg) scale(0); }
            100% { transform: rotate(360deg) scale(1); }
        }
        @keyframes rainbowText {
            0% { color: #ff5722; } 25% { color: #4caf50; } 50% { color: #2196f3; } 75% { color: #9c27b0; } 100% { color: #ff5722; }
        }
    </style>
</head>
<body>

    <p style="text-align:center; margin: 0 0 12px;">
        <a href="./index.html" style="display:inline-block; padding: 10px 16px; border-radius: 12px; background:#2196f3; color:#fff; text-decoration:none; font-weight:700; box-shadow:0 4px 0 #1565c0;">返回集點系統 ⭐</a>
    </p>

    <h1>⚡ 兒童專注力鋼琴大冒險 🎵</h1>
    
    <div>
        <button class="btn" style="background-color: #4caf50; box-shadow: 0 4px 0 #388e3c;" onclick="switchSong(0)">🐝 小蜜蜂</button>
        <button class="btn" style="background-color: #ff9800; box-shadow: 0 4px 0 #f57c00;" onclick="switchSong(1)">⭐ 小星星</button>
    </div>

    <p style="font-size: 20px; font-weight: bold; margin: 15px 0 5px 0;" id="song-title">目前歌曲：小蜜蜂</p>
    
    <!-- 遊戲數據儀表板 -->
    <div class="dashboard">
        <div class="info-box" id="score-box">得分: 0</div>
        <div class="info-box" id="combo-box">連擊: 0 🔥</div>
        <div class="info-box" id="status-box">專注中 ✨</div>
    </div>

    <!-- 顯示簡譜 -->
    <div class="score-display" id="score-view">---</div>

    <!-- 鋼琴琴鍵 -->
    <div class="piano-container">
        <div class="key" id="key-1" onclick="playNote(1)">1<br>Do</div>
        <div class="key" id="key-2" onclick="playNote(2)">2<br>Re</div>
        <div class="key" id="key-3" onclick="playNote(3)">3<br>Mi</div>
        <div class="key" id="key-4" onclick="playNote(4)">4<br>Fa</div>
        <div class="key" id="key-5" onclick="playNote(5)">5<br>So</div>
        <div class="key" id="key-6" onclick="playNote(6)">6<br>La</div>
        <div class="key" id="key-7" onclick="playNote(7)">7<br>Si</div>
    </div>

    <!-- 絢麗過關大圖示層 -->
    <div class="celebration-overlay" id="victory-screen">
        <div class="celebration-badge">
            <div class="big-icon">👑</div>
            <h2 id="victory-title">太棒了！🎉</h2>
            <p id="victory-sub">你獲得了超神音樂家獎牌！</p>
            <p id="final-score" style="color: #e91e63; font-size: 30px;">最終得分: 0</p>
            <button class="btn" onclick="closeVictory()">再玩一次 🔁</button>
        </div>
    </div>

    <script>
        const frequencies = { 1: 261.63, 2: 293.66, 3: 329.63, 4: 349.23, 5: 392.00, 6: 440.00, 7: 493.88 };
        const songs = [
            { name: "小蜜蜂", notes: [5, 3, 3, 4, 2, 2, 1, 2, 3, 4, 5, 5, 5] },
            { name: "小星星", notes: [1, 1, 5, 5, 6, 6, 5, 4, 4, 3, 3, 2, 2, 1] }
        ];

        let currentSongIndex = 0;
        let currentNoteIndex = 0;
        
        // 核心機制變數
        let score = 0;
        let combo = 0;
        let wrongCount = 0;
        let isFocused = true;
        let lastActionTime = Date.now();
        let timeBonusTimer = null;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        // 初始化音訊（防止瀏覽器阻擋）
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playTone(freq) {
            initAudio();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = freq;
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.4);
        }

        // 隨時間自動加分定時器（每秒執行）
        function startTimeBonus() {
            if (timeBonusTimer) clearInterval(timeBonusTimer);
            timeBonusTimer = setInterval(() => {
                let now = Date.now();
                // 檢查是否太久沒動作（超過 5 秒）
                if (now - lastActionTime > 5000) {
                    setFocusState(false);
                }

                // 只有在專注狀態下才隨時間加分
                if (isFocused) {
                    score += 5; // 專注時間每秒 +5 分
                    updateDashboard();
                }
            }, 1000);
        }

        // 設定專注/分心狀態
        function setFocusState(focused) {
            isFocused = focused;
            const statusBox = document.getElementById('status-box');
            if (isFocused) {
                statusBox.innerText = "專注中 ✨";
                statusBox.classList.remove('distracted');
            } else {
                statusBox.innerText = "分心了 💤";
                statusBox.classList.add('distracted');
            }
        }

        // 更新數據看板
        function updateDashboard() {
            document.getElementById('score-box').innerText = `得分: ${score}`;
            
            const comboBox = document.getElementById('combo-box');
            comboBox.innerText = `連擊: ${combo} 🔥`;
            if (combo > 0) {
                comboBox.style.transform = "scale(1.2)";
                setTimeout(() => comboBox.style.transform = "scale(1)", 100);
            }
        }

        // 更新畫面提示
        function updateGame() {
            const song = songs[currentSongIndex];
            
            // 【特別加分機制】完成歌曲
            if (currentNoteIndex >= song.notes.length) {
                clearInterval(timeBonusTimer);
                let clearBonus = 500 + (combo * 50); // 基礎 500 分 + 連擊獎勵
                score += clearBonus;
                updateDashboard();
                
                // 觸發大圖示絢麗慶祝
                showVictory(clearBonus);
                return;
            }

            document.querySelectorAll('.key').forEach(k => k.classList.remove('highlight'));

            let scoreHTML = "";
            song.notes.forEach((note, index) => {
                if (index === currentNoteIndex) {
                    scoreHTML += `<span style="color: #ff5722; font-size: 42px; border-bottom: 4px solid #ff5722; padding: 0 5px;">${note}</span> `;
                } else {
                    scoreHTML += `${note} `;
                }
            });
            document.getElementById('score-view').innerHTML = scoreHTML;

            const currentNote = song.notes[currentNoteIndex];
            const targetKey = document.getElementById(`key-${currentNote}`);
            if (targetKey) {
                targetKey.classList.add('highlight');
            }
        }

        // 按下琴鍵
        function playNote(noteNum) {
            lastActionTime = Date.now(); // 刷新動作時間
            
            if (frequencies[noteNum]) {
                playTone(frequencies[noteNum]);
            }

            const song = songs[currentSongIndex];
            
            if (noteNum === song.notes[currentNoteIndex]) {
                // 【答對】
                combo++;
                wrongCount = 0; // 重設錯誤次數
                score += 10 + (combo * 2); // 越連擊得分越高
                
                setFocusState(true); // 答對立刻重啟專注加分
                currentNoteIndex++;
                updateDashboard();
                updateGame();
            } else {
                // 【答錯/失誤】
                combo = 0; // 連擊中斷
                wrongCount++;
                
                // 連續失誤 3 次以上，停止加分
                if (wrongCount >= 3) {
                    setFocusState(false);
                }
                updateDashboard();
            }
        }

        // 彈出過關大圖示
        function showVictory(bonus) {
            document.getElementById('final-score').innerText = `最終總得分: ${score} 分！`;
            document.getElementById('victory-sub').innerText = `完成歌曲特別加了 ${bonus} 分！`;
            
            // 隨機換大圖示增添驚喜感
            const icons = ['👑', '🏆', '🚀', '🌈', '🎨', '🍿'];
            document.querySelector('.big-icon').innerText = icons[Math.floor(Math.random() * icons.length)];
            
            document.getElementById('victory-screen').classList.add('show');
        }

        function closeVictory() {
            document.getElementById('victory-screen').classList.remove('show');
            switchSong(currentSongIndex); // 重新開始這首歌
        }

        function switchSong(index) {
            currentSongIndex = index;
            currentNoteIndex = 0;
            score = 0;
            combo = 0;
            wrongCount = 0;
            setFocusState(true);
            lastActionTime = Date.now();
            document.getElementById('song-title').innerText = `目前歌曲：${songs[index].name}`;
            updateDashboard();
            updateGame();
            startTimeBonus();
        }

        // 第一次點擊網頁時啟動時間定時器（迎合瀏覽器安全機制）
        window.addEventListener('click', function() {
            initAudio();
            if(!timeBonusTimer) startTimeBonus();
        }, { once: true });

        updateGame();
        updateDashboard();
    </script>
</body>
</html>
